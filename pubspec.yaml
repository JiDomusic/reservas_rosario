name: reserva_template
description: "Template de reservas para restaurantes y bares."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  supabase_flutter: ^2.8.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  page_view_dot_indicator: ^2.3.0
  http: ^1.2.2
  html: ^0.15.4
  audioplayers: ^6.1.0
  vibration: ^2.0.0
  url_launcher: ^6.3.1
  pdf: ^3.10.8
  printing: ^5.13.3
  shared_preferences: ^2.3.2
  image_picker: ^1.0.7
  flex_color_picker: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
